<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Photos — Vu Le</title>
    <meta name="author" content="Vu Le" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Photography by Vu Le — national parks, hiking, travel, and life in New England." />
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="../stylesheet.css" />
    <link rel="stylesheet" type="text/css" href="gallery.css" />
  </head>

  <body>
    <div class="gallery-wrap">
      <div class="gallery-header">
        <h1>Photos</h1>
        <p>Adventures across the American Southwest, New England, and the world — captured with a Sony A6400.</p>
        <a href="/" class="back-link">← Back to homepage</a>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="southwest">Southwest USA</button>
        <button class="filter-btn" data-filter="newengland">New England</button>
        <button class="filter-btn" data-filter="city">City &amp; Travels</button>
        <button class="filter-btn" data-filter="wildlife">Wildlife &amp; Nature</button>
      </div>

      <div class="photo-grid" id="photo-grid">
        <p style="color:#999;padding:20px">Loading photos...</p>
      </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lb-close">&times;</button>
      <button class="lightbox-prev" id="lb-prev">&#8249;</button>
      <img id="lb-img" src="" alt="" />
      <button class="lightbox-next" id="lb-next">&#8250;</button>
      <div class="lightbox-caption" id="lb-caption"></div>
    </div>

    <script src="gallery.js"></script>
  </body>
</html>
